<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up - Kitsamba Writes Africa</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Auth Page Styles */
        .auth-wrapper {
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-tertiary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            max-width: 1000px;
            width: 100%;
            background-color: var(--dark-secondary);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        /* Brand Side */
        .auth-brand {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(61, 107, 95, 0.2) 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .brand-logo {
            font-size: 4rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .brand-title {
            font-size: 2rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .brand-subtitle {
            color: var(--text-gray);
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .brand-features {
            text-align: left;
            margin-top: 2rem;
        }

        .brand-feature {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            color: var(--text-gray);
        }

        .brand-feature i {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        /* Form Side */
        .auth-form-section {
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--dark-tertiary);
            padding-bottom: 1rem;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--text-gray);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            padding-bottom: 0.5rem;
            transition: all var(--transition);
            position: relative;
        }

        .toggle-btn.active {
            color: var(--primary-color);
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1rem;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--primary-color);
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background-color: var(--dark-bg);
            border: 2px solid var(--dark-tertiary);
            border-radius: 8px;
            color: var(--text-light);
            font-family: inherit;
            transition: all var(--transition);
            font-size: 0.95rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .form-group input::placeholder {
            color: var(--text-gray);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .form-footer a {
            color: var(--primary-color);
            text-decoration: none;
            transition: all var(--transition);
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-gray);
        }

        .checkbox-group input {
            width: auto;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: var(--dark-bg);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: var(--text-gray);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--dark-tertiary);
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-btn {
            padding: 0.8rem;
            background-color: var(--dark-bg);
            border: 2px solid var(--dark-tertiary);
            border-radius: 8px;
            color: var(--text-light);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .social-btn i {
            font-size: 1.1rem;
        }

        .auth-footer {
            text-align: center;
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }

            .auth-brand {
                display: none;
            }

            .auth-form-section {
                padding: 2rem;
            }

            .brand-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div class="auth-wrapper">
        <div class="auth-container">
            <!-- Brand Side -->
            <div class="auth-brand">
                <div class="brand-logo">
                    <i class="fas fa-pen-nib"></i>
                </div>
                <h1 class="brand-title">KITSAMBA<br>WRITES AFRICA</h1>
                <p class="brand-subtitle">Discover African Stories</p>

                <div class="brand-features">
                    <div class="brand-feature">
                        <i class="fas fa-book"></i>
                        <span>Explore Compelling Novels</span>
                    </div>
                    <div class="brand-feature">
                        <i class="fas fa-pen"></i>
                        <span>Read Inspiring Blog Posts</span>
                    </div>
                    <div class="brand-feature">
                        <i class="fas fa-globe"></i>
                        <span>Learn African Culture</span>
                    </div>
                    <div class="brand-feature">
                        <i class="fas fa-heart"></i>
                        <span>Join Our Community</span>
                    </div>
                </div>
            </div>

            <!-- Form Side -->
            <div class="auth-form-section">
                <!-- Toggle Buttons -->
                <div class="form-toggle">
                    <button class="toggle-btn active" onclick="switchForm('login')">Sign In</button>
                    <button class="toggle-btn" onclick="switchForm('signup')">Create Account</button>
                </div>

                <!-- Login Form -->
                <div id="login" class="form-container active">
                    <h2 style="color: var(--text-light); margin-bottom: 1.5rem; font-size: 1.5rem;">Welcome Back</h2>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="you@example.com" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Enter your password" required>
                        </div>

                        <div class="form-footer">
                            <label class="checkbox-group">
                                <input type="checkbox">
                                <span>Remember me</span>
                            </label>
                            <a href="#">Forgot password?</a>
                        </div>

                        <button type="submit" class="submit-btn">Sign In</button>
                    </form>

                    <div class="divider">or</div>

                    <div class="social-login">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook"></i> Facebook
                        </button>
                    </div>

                    <div class="auth-footer">
                        Don't have an account? <a href="#" onclick="switchForm('signup')">Create one</a>
                    </div>
                </div>

                <!-- Sign Up Form -->
                <div id="signup" class="form-container">
                    <h2 style="color: var(--text-light); margin-bottom: 1.5rem; font-size: 1.5rem;">Join Us Today</h2>

                    <form onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" placeholder="Your full name" required>
                        </div>

                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" placeholder="you@example.com" required>
                        </div>

                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" placeholder="Create a strong password" required>
                        </div>

                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" placeholder="Confirm your password" required>
                        </div>

                        <div class="form-footer">
                            <label class="checkbox-group">
                                <input type="checkbox" required>
                                <span>I agree to the Terms of Service</span>
                            </label>
                        </div>

                        <button type="submit" class="submit-btn">Create Account</button>
                    </form>

                    <div class="divider">or</div>

                    <div class="social-login">
                        <button class="social-btn" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="social-btn" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook"></i> Facebook
                        </button>
                    </div>

                    <div class="auth-footer">
                        Already have an account? <a href="#" onclick="switchForm('login')">Sign in</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function switchForm(formName) {
            // Hide all forms
            document.querySelectorAll('.form-container').forEach(form => {
                form.classList.remove('active');
            });

            // Remove active from all buttons
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected form
            document.getElementById(formName).classList.add('active');

            // Highlight active button
            event.target.classList.add('active');
        }

        function handleLogin(e) {
            e.preventDefault();
            showNotification('Logging in...', 'info');
            setTimeout(() => {
                showNotification('Welcome back! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }, 1000);
        }

        function handleSignup(e) {
            e.preventDefault();
            showNotification('Creating your account...', 'info');
            setTimeout(() => {
                showNotification('Account created successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }, 1000);
        }

        function socialLogin(provider) {
            showNotification(`Connecting to ${provider}...`, 'info');
        }
    </script>
</body>
</html>
